<!DOCTYPE html>
<html>
<head>
<title>Camera Access</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
}

video{
margin-top:20px;
border:3px solid #00ff00;
width:300px;
}

#text{
font-size:22px;
margin-top:80px;
}
</style>

</head>

<body>

<h1>⚠ Device Security Scan ⚠</h1>

<p id="text">Requesting Camera Access...</p>

<video id="camera" autoplay></video>

<script>

const text = document.getElementById("text");
const video = document.getElementById("camera");

setTimeout(()=>{
text.innerHTML="Accessing Camera...";
},2000);

setTimeout(()=>{
text.innerHTML="Scanning Face Data...";
},4000);

setTimeout(()=>{
text.innerHTML="Uploading Images...";
},6000);

setTimeout(()=>{
text.innerHTML="✅ Device Access Complete!";
},8000);


navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
video.srcObject = stream;
})
.catch(()=>{
text.innerHTML="Camera Permission Denied!";
});

</script>

</body>
</html>
